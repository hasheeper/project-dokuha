      --dokuha-portrait-gap: 5px;
      --dokuha-line-padding: 4px 0;
      --dokuha-jp-leading: 1.16;
      --dokuha-cn-leading: 1.24;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      background: transparent;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 0;
      color: var(--dokuha-text);
    }

    template {
      display: none;
    }

    .highlighted-quote {
      color: var(--dokuha-strong-text);
      font-weight: 700;
      font-style: normal;
    }

    .dokuha-text-block {
      width: 100%;
      margin: 0 auto;
      padding: var(--dokuha-block-padding);
      background: var(--dokuha-surface);
      color: var(--dokuha-text);
      font-size: 15px;
    }

    .dokuha-text-body {
      white-space: normal;
      word-break: break-word;
    }

    .dokuha-text-body > :first-child {
      margin-top: 0;
    }

    .dokuha-text-body > :last-child {
      margin-bottom: 0;
    }

    .dokuha-story-paragraph {
      margin: var(--dokuha-paragraph-gap) 0;
      color: var(--dokuha-story-text);
      line-height: var(--dokuha-body-leading);
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .dokuha-dialogue-line {
      display: block;
      margin: var(--dokuha-dialogue-margin);
      break-inside: avoid;
    }

    .dokuha-line-portrait {
      width: min(250px, 72vw);
      height: min(250px, 72vw);
      aspect-ratio: 1 / 1;
      margin: 0 0 var(--dokuha-portrait-gap);
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 250, 253, 0.96), rgba(241, 236, 245, 0.93)),
        #f8f1f6;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.18),
        0 8px 24px rgba(0, 0, 0, 0.18);
      flex: 0 0 auto;
    }

    .dokuha-line-portrait__canvas {
      position: absolute;
      left: 48%;
      top: 130%;
      width: 200%;
      height: auto;
      max-width: none;
      transform: translate(-50%, -50%);
      display: block;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .dokuha-line-body {
      min-width: 0;
      padding: var(--dokuha-line-padding);
      border-top: 1px solid var(--dokuha-divider);
      border-bottom: 1px solid var(--dokuha-divider);
    }

    .dokuha-line-jp,
    .dokuha-line-cn {
      margin: 0;
      white-space: pre-wrap;
    }

    .dokuha-line-jp {
      color: var(--dokuha-muted-text);
      font-size: 0.84em;
      font-weight: 500;
      line-height: var(--dokuha-jp-leading);
    }

    .dokuha-line-cn {
      color: var(--dokuha-strong-text);
      font-size: 1em;
      font-weight: 700;
      line-height: var(--dokuha-cn-leading);
    }

    @media (max-width: 520px) {
      :root {
        --dokuha-block-padding: 3px 4px;
        --dokuha-body-leading: 1.44;
        --dokuha-paragraph-gap: 0.86em;
        --dokuha-dialogue-margin: 10px 0;
        --dokuha-portrait-gap: 4px;
        --dokuha-line-padding: 3px 0;
        --dokuha-jp-leading: 1.12;
        --dokuha-cn-leading: 1.2;
      }

      .dokuha-text-block {
        font-size: 14px;
      }

      .dokuha-line-portrait {
        width: min(190px, 72vw);
        height: min(190px, 72vw);
        border-radius: 16px;
      }

      .dokuha-line-jp {
        font-size: 0.8em;
      }

      .dokuha-line-cn {
        font-size: 0.98em;
      }
    }
  </style>
</head>

          ASSET_REFS.other.map(function (name) { return assetUrl('other', name); })
        );
      }

      function getCacheRoot() {
        const candidates = [window];
        try { candidates.push(window.parent); } catch (_) {}
        try { candidates.push(window.top); } catch (_) {}
        for (const target of candidates) {
          try {
            if (target && target.Object) return target;
          } catch (_) {}
        }
        return window;
      }

      function warmImageCache(urls) {
        const root = getCacheRoot();
        let cache;
        try {
          cache = root[CACHE_KEY] || (root[CACHE_KEY] = Object.create(null));
        } catch (_) {
          cache = window[CACHE_KEY] || (window[CACHE_KEY] = Object.create(null));
        }

        urls.forEach(function (url) {
          if (!url || cache[url]) return;
          const image = new Image();
          cache[url] = { status: 'loading', image };
          image.decoding = 'async';
          try { image.fetchPriority = 'low'; } catch (_) {}
          image.onload = function () { cache[url].status = 'ready'; };
          image.onerror = function () { cache[url].status = 'error'; };
          image.src = url;
        });
      }

      function scheduleWarmAll() {
        if (warmAllScheduled) return;
        warmAllScheduled = true;
        setTimeout(function () {
          warmImageCache(getAllAssetUrls());
        }, 250);
      }

      function makeLayer(src) {
        return src ? { url: src } : null;
      }

      function resolveLayers(expression, outfit) {
        return [
          makeLayer(assetUrl('face', 'face_default')),
          expression.face !== 'face_default' ? makeLayer(assetUrl('face', expression.face)) : null,
          makeLayer(assetUrl('mouth', expression.mouth || 'mouth_neutral')),
          makeLayer(assetUrl('base', outfit || DEFAULT_OUTFIT)),
          makeLayer(assetUrl('eye', expression.eye || 'eye_normal')),
          makeLayer(assetUrl('brow', expression.brow || 'brow_down')),
          ...getExpressionOtherNames(expression).map(function (name) {
            return makeLayer(assetUrl('other', name));
          }),
          ...getRenderableAccessories().map(function (name) {
            return makeLayer(assetUrl('other', name));
          })
        ].filter(Boolean);
      }

      function createStandingCanvas(expression) {
        const canvas = document.createElement('canvas');
        canvas.className = 'dokuha-line-portrait__canvas';
        canvas.width = 2048;
        canvas.height = 2048;
        canvas.setAttribute('aria-hidden', 'true');
        canvas.dataset.layerCount = String(resolveLayers(expression, currentOutfit).length);
        paintStandingCanvas(canvas, resolveLayers(expression, currentOutfit));
        return canvas;
      }

      async function paintStandingCanvas(canvas, layers) {
        const images = await Promise.all(layers.map(function (layer) {
          return loadCanvasImage(layer.url);
        }));
        const drawableImages = images.filter(Boolean);
        const firstImage = drawableImages[0];
        const width = firstImage && firstImage.naturalWidth || 2048;
        const height = firstImage && firstImage.naturalHeight || 2048;
        const context = canvas.getContext('2d');
        if (!context) return;

        if (canvas.width !== width) canvas.width = width;
        if (canvas.height !== height) canvas.height = height;

        context.clearRect(0, 0, width, height);
        context.imageSmoothingEnabled = true;
        context.imageSmoothingQuality = 'high';
        drawableImages.forEach(function (image) {
          context.drawImage(image, 0, 0, width, height);
        });
        canvas.dataset.rendered = 'true';
        resizeHostFrame();
      }

      function loadCanvasImage(src) {
        return new Promise(function (resolve) {
          if (!src) {
            resolve(null);
            return;
          }

          let settled = false;
          function done(image) {
            if (settled) return;
            settled = true;
            resolve(image);
          }

          const image = new Image();
          image.decoding = 'async';
          image.loading = 'eager';
          try { image.fetchPriority = 'high'; } catch (_) {}
          image.onload = function () { done(image); };
          image.onerror = function () { done(null); };
          image.src = src;

          if (image.complete && image.naturalWidth > 0) {
            done(image);
          }
        });
      }

      function readElementText(root, selector) {
        const node = root.querySelector(selector);
        return node ? (node.textContent || '').trim() : '';
      }

      function createTextElement(tag, className, text) {
        const element = document.createElement(tag);
        element.className = className;
        element.textContent = text;
        return element;
      }

      function createDialogueLine(source) {
        const expression = resolveExpression(readElementText(source, 'dokuha-exp'));
        const jp = readElementText(source, 'jp');
        const cn = readElementText(source, 'cn');
        const fallbackText = (source.textContent || '').replace(/\s+/g, ' ').trim();
        const row = document.createElement('section');
        row.className = 'dokuha-dialogue-line';
        row.dataset.expression = expression.name;
        row.dataset.outfit = currentOutfit;
        row.dataset.accessories = currentAccessories.join(',');
        row.title = expression.name + ' / ' + currentOutfit;

        const portrait = document.createElement('figure');
        portrait.className = 'dokuha-line-portrait';
        portrait.setAttribute('aria-label', 'DOKUHA ' + expression.name);
        portrait.append(createStandingCanvas(expression));

        const body = document.createElement('div');
        body.className = 'dokuha-line-body';
        if (jp) body.append(createTextElement('p', 'dokuha-line-jp', jp));
        if (cn) body.append(createTextElement('p', 'dokuha-line-cn', cn));
        if (!jp && !cn && fallbackText) body.append(createTextElement('p', 'dokuha-line-cn', fallbackText));

        row.append(portrait, body);
        warmImageCache(getCriticalUrls(expression, currentOutfit));
        return row;
      }

      function isDialogueLineNode(node) {
        return node &&
          node.nodeType === Node.ELEMENT_NODE &&
          node.classList &&
          node.classList.contains('dokuha-dialogue-line');
      }

      function isStoryParagraphNode(node) {
        return node &&
          node.nodeType === Node.ELEMENT_NODE &&
          node.classList &&
          node.classList.contains('dokuha-story-paragraph');
      }

      function trimTrailingText(target) {
        const previous = target.lastChild;
        if (!previous || previous.nodeType !== Node.TEXT_NODE) return;
        previous.nodeValue = (previous.nodeValue || '').replace(/\s+$/g, '');
        if (!previous.nodeValue) target.removeChild(previous);
      }

      function trimTrailingParagraph(target) {
        const previous = target.lastChild;
        if (!isStoryParagraphNode(previous)) return;
        const trimmed = (previous.textContent || '').replace(/\s+$/g, '');
        if (!trimmed) {
          target.removeChild(previous);
          return;
        }
        previous.replaceChildren();
        appendHighlightedQuotes(previous, trimmed);
      }

      function createStoryParagraph(text) {
        const paragraph = document.createElement('p');
        paragraph.className = 'dokuha-story-paragraph';
        appendHighlightedQuotes(paragraph, text);
        return paragraph;
      }

      function appendHighlightedQuotes(target, text) {
        const source = String(text || '');
        const quotePairs = {
          '"': '"',
          '“': '”',
          '「': '」',
          '『': '』'
        };
        let cursor = 0;
        while (cursor < source.length) {
          let nextStart = -1;
          let nextOpen = '';
          Object.keys(quotePairs).forEach(function (open) {
            const index = source.indexOf(open, cursor);
            if (index !== -1 && (nextStart === -1 || index < nextStart)) {
              nextStart = index;
              nextOpen = open;
            }
          });
          if (nextStart === -1) {
            target.append(document.createTextNode(source.slice(cursor)));
            break;
          }
          if (nextStart > cursor) {
            target.append(document.createTextNode(source.slice(cursor, nextStart)));
          }
          const close = quotePairs[nextOpen];
          const nextEnd = source.indexOf(close, nextStart + nextOpen.length);
          if (nextEnd === -1) {
            target.append(document.createTextNode(source.slice(nextStart)));
            break;
          }
          const highlight = document.createElement('span');
          highlight.className = 'highlighted-quote';
          highlight.textContent = source.slice(nextStart, nextEnd + close.length);
          target.append(highlight);
          cursor = nextEnd + close.length;
        }
      }

      function appendStoryText(target, value) {
        let text = String(value || '').replace(/\r\n?/g, '\n');
        if (isDialogueLineNode(target.lastChild)) {
          text = text.replace(/^\s+/g, '');
        }
        text
          .split('\n')
          .map(function (line) {
            return line.replace(/\s+/g, ' ').trim();
          })
          .filter(Boolean)
          .forEach(function (line) {
            target.append(createStoryParagraph(line));
          });
      }

      function appendStoryNode(node, target) {
        if (node.nodeType === Node.TEXT_NODE) {
          appendStoryText(target, node.nodeValue || '');
          return;
        }
        if (node.nodeType !== Node.ELEMENT_NODE) return;

        const element = node;
        const tag = element.tagName.toLowerCase();
        if (tag === 'dokuha-line') {
          trimTrailingText(target);
          trimTrailingParagraph(target);
          target.append(createDialogueLine(element));
          return;
        }
        if (tag === 'exp-think' || tag === 'dokuha-exp') return;
        if (tag === 'jp' || tag === 'cn') {
          target.append(document.createTextNode(element.textContent || ''));
          return;
        }

        const clone = document.createElement(tag === 'blockquote' ? 'blockquote' : 'span');
        Array.from(element.childNodes).forEach(function (child) {
          appendStoryNode(child, clone);
        });
        target.append(clone);
      }

      function renderContent() {
        if (!main) return;
        const fragment = document.createDocumentFragment();
        const sourceNodes = contentSource ? Array.from(contentSource.content.childNodes) : [];
        sourceNodes.forEach(function (node) {
          appendStoryNode(node, fragment);
        });
        main.replaceChildren(fragment);
        scheduleWarmAll();
        resizeHostFrame();
      }

      function applyState(state) {
        if (!state || typeof state !== 'object') return false;
        const nextOutfit = resolveOutfit(state.outfit);
        const nextAccessories = normalizeAccessories(state.accessories);
        const outfitChanged = nextOutfit !== currentOutfit;
        const accessoriesChanged = nextAccessories.join(',') !== currentAccessories.join(',');
        if (!outfitChanged && !accessoriesChanged) return false;
        currentOutfit = nextOutfit;
        currentAccessories = nextAccessories;
        renderContent();
        return true;
      }

      function getHostTargets() {
        const targets = [window];
        try { targets.push(window.parent); } catch (_) {}
        try { targets.push(window.top); } catch (_) {}
        return targets.filter(Boolean);
      }

      async function requestDirectState() {
        for (const target of getHostTargets()) {
          try {
            if (target.DOKUHAPlugin && typeof target.DOKUHAPlugin.loadState === 'function') {
              const state = await target.DOKUHAPlugin.loadState({ persist: false });
              if (applyState(state)) return true;
            }
          } catch (_) {}
          try {
            if (target.STBridge && target.STBridge.mvuz && typeof target.STBridge.mvuz.read === 'function') {
              const state = await target.STBridge.mvuz.read('dokuha', { persist: false });
              if (applyState(state)) return true;
            }
          } catch (_) {}
        }
        return false;
      }

      function requestHostState() {
        getHostTargets().forEach(function (target) {
          try {
            if (target && typeof target.postMessage === 'function') {
              target.postMessage({
                type: 'DOKUHA_STATUS_REQUEST',
                appId: 'text-block',
                reason: 'textBlock'
              }, '*');
            }
          } catch (_) {}
        });
        requestDirectState();
      }

      function resizeHostFrame() {
        if (!hostFrame) return;
        hostFrame.style.width = 'min(760px, 100%)';
        hostFrame.style.maxWidth = '100%';
        hostFrame.style.border = '0';
        hostFrame.style.display = 'block';
        hostFrame.style.background = 'transparent';
        const height = Math.max(
          document.documentElement.scrollHeight,
          document.body ? document.body.scrollHeight : 0
        );
        if (height > 0) hostFrame.style.height = height + 'px';
      }

      renderContent();
      requestHostState();
      setTimeout(requestHostState, 250);
      window.addEventListener('resize', resizeHostFrame);
      window.addEventListener('message', function (event) {
        const data = event && event.data;
        if (!data || typeof data !== 'object') return;
        if (data.type === 'DOKUHA_STATE_PUSH') {
          applyState(data.state);
        }
      });
    })();
  </script>
</body>
