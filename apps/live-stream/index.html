<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DOKUHA LIVE STREAM UI</title>
  <script src="./vendor/pixi.min.js"></script>
  <script src="./vendor/pixi-spine-3.8.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Noto+Sans+SC:wght@500;700;900&family=JetBrains+Mono:wght@500;700;800&display=swap');

    :root {
      /* 核心配色：深沉的冷色调黑与高饱和玫红 */
      --bg-dark: #120e14;
      --panel-dark: #161219;
      --accent-pink: #df4576;
      --accent-dim: #6b223a;

      --text-white: #f8f6f7;
      --text-gray: #7a7382;
      --text-dim: #4d4651;
      --border-color: #2b252f;
      --glass-bg: rgba(22, 17, 24, 0.75);

      --font-eng: 'Oswald', sans-serif;
      --font-chs: 'Noto Sans SC', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

    ::-webkit-scrollbar { display: none; }

    body {
      background-color: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: var(--font-chs);
      color: var(--text-white);
      -webkit-font-smoothing: antialiased;
      overflow: visible;
    }

    /* ================= 模拟手机屏幕外壳 ================= */
    .mobile-app-frame {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100vh;
      max-height: 932px;
      overflow: visible; /* 允许立绘破窗 */
      display: flex;
      flex-direction: column;
    }

    /* 背景裁切层：严格困住背景底色和水印 */
    .frame-bg-clipper {
      position: absolute;
      inset: 0;
      background-color: var(--bg-dark);
      border-radius: 0;
      border: none;
      box-shadow: none;
      overflow: hidden;
      z-index: 0;
    }

    @media (max-height: 850px) {
      .mobile-app-frame { max-height: 100vh; }
      .frame-bg-clipper { border-radius: 0; border: none; }
    }

    /* ================= 背景环境组 ================= */
    .bg-dots {
      position: absolute; inset: 0;
      background-image: radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.03) 1px, transparent 0);
      background-size: 24px 24px;
    }
    .bg-watermark {
      position: absolute; top: 12%; right: -15%;
      font-family: var(--font-eng); font-size: 160px; font-weight: 900;
      color: rgba(255, 255, 255, 0.015); line-height: 1; letter-spacing: -4px;
    }
    .bg-slashes {
      position: absolute; bottom: 0; left: 0; right: 0; height: 30vh;
      background: repeating-linear-gradient(-45deg, rgba(0,0,0,0.6) 0, rgba(0,0,0,0.6) 12px, transparent 12px, transparent 24px);
      -webkit-mask-image: linear-gradient(to top, black 0%, transparent 100%);
      mask-image: linear-gradient(to top, black 0%, transparent 100%);
    }

    /* ================= 顶部控制条 ================= */
    .top-nav-bar {
      position: absolute; top: 0; left: 0; right: 0; height: 64px;
      display: grid; grid-template-columns: auto minmax(94px, 1fr) auto; align-items: end; gap: 10px; padding: 0 18px 12px;
      background: linear-gradient(to bottom, rgba(18, 14, 20, 0.9) 20%, transparent); z-index: 50;
    }
    .nav-label {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-mono); font-size: 10px; font-weight: 800; letter-spacing: 2px;
      white-space: nowrap;
    }
    .nav-label .dot { width: 8px; height: 8px; background: var(--accent-pink); border-radius: 50%; box-shadow: 0 0 8px rgba(223, 69, 118, 0.5); }
    .nav-label .secure { color: var(--accent-pink); }
    .nav-clock {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-width: 0;
      padding-bottom: 1px;
      justify-self: center;
    }
    .nav-clock-label {
      font-family: var(--font-mono);
      font-size: 7px;
      font-weight: 800;
      letter-spacing: 1.6px;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .nav-clock-value {
      max-width: 126px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.8px;
      color: var(--text-white);
      text-shadow: 0 0 10px rgba(223, 69, 118, 0.22);
    }
    .nav-actions .nav-label { display: none; }

    /* ================= 核心流式内容 ================= */
    .content-flow {
      position: relative; flex: 1;
      overflow: visible;
      padding: 60px 24px 100px 24px;
      display: flex; flex-direction: column; z-index: 10;
    }

    /* 1. 立绘屏核心区 (去掉了文字排版后，它获得了更多延展空间) */
    .hero-view {
      position: relative;
      width: 100%;
      flex: 1;
      min-height: 480px; /* 最小高度增大，让立绘展示更加充分 */
      display: flex;
      justify-content: center;
      align-items: flex-end;
      margin-bottom: 24px;
    }

    .hero-text-bg {
      position: absolute; top: 15px; left: -10px; z-index: 1;
    }
    .hero-text-bg::before {
      content: ""; position: absolute; top: 6px; bottom: 35px; left: 0; width: 6px; background: var(--accent-pink); border-radius: 2px;
    }
    .hero-live {
      font-family: var(--font-eng); font-size: 96px; font-weight: 700; line-height: 1; margin-bottom: -2px; padding-left: 16px;
    }
    .hero-streaming {
      font-family: var(--font-mono); font-size: 15px; font-weight: 800; color: var(--accent-pink); letter-spacing: 0.5em; margin-left: 20px;
    }

    /* 140% 立体破框立绘 */
    .character-art {
      position: absolute;
      top: -5%;
      left: 50%;
      transform: translateX(-50%);
      width: 140%;
      max-width: none;
      height: 105%;
      object-fit: cover;
      object-position: center 5%;
      z-index: 10;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.8));
      pointer-events: none;
      -webkit-mask-image: linear-gradient(to bottom, black 65%, transparent 100%);
      mask-image: linear-gradient(to bottom, black 65%, transparent 100%);
    }
    .character-art.spine-art {
      overflow: visible;
    }
    .character-art.spine-art canvas {
      display: block;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* 左侧悬窗：短能量排 */
    .hud-float-stack {
      position: absolute;
      bottom: 10px;
      left: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 20;
    }

    .hud-ribbon {
      display: grid; grid-template-columns: 24px 142px; align-items: center; gap: 8px;
      background: var(--glass-bg); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border-color); border-left: 3px solid var(--c); border-radius: 6px;
      padding: 8px 12px 8px 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }
    .hud-ribbon-icon { display: flex; justify-content: center; align-items: center; color: var(--c); }
    .hud-ribbon-icon svg { width: 18px; height: 18px; filter: drop-shadow(0 0 4px rgba(255,255,255,0.1)); }
    .hud-ribbon-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; overflow: hidden; }
    .hud-ribbon-top { display: grid; grid-template-columns: minmax(0, 1fr) 86px; align-items: flex-end; gap: 6px; width: 100%; overflow: hidden; }
    .hud-ribbon-label { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: var(--font-mono); font-size: 9px; font-weight: 800; color: var(--text-gray); letter-spacing: 1px; }
    .hud-ribbon-val { justify-self: end; width: 86px; max-width: 86px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; font-family: var(--font-eng); font-size: 18px; font-weight: 700; color: var(--text-white); line-height: 1; }
    .hud-ribbon-val.text-value { font-family: var(--font-eng); font-size: 18px; letter-spacing: 1px; text-transform: uppercase; }
    .ribbon-track { width: 100%; height: 3px; background: rgba(0,0,0,0.6); border-radius: 2px; overflow: hidden; }
    .ribbon-fill { height: 100%; background: var(--c); border-radius: 2px; }

    /* 右侧单向弥散玻璃板条形码 */
    .barcode-widget {
      position: absolute;
      bottom: 10px;
      right: -24px;
      display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
      padding: 10px 24px 10px 100px; z-index: 20;
    }
    .barcode-widget::before {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(to left, rgba(22, 17, 24, 0.95) 0%, rgba(22, 17, 24, 0.4) 60%, transparent 100%);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      -webkit-mask-image: linear-gradient(to left, black 30%, transparent 100%); mask-image: linear-gradient(to left, black 30%, transparent 100%);
      border-right: 1px solid rgba(255, 255, 255, 0.05); z-index: -1;
    }
    .barcode-widget .barcode-img {
      width: 80px; height: 14px;
      background: repeating-linear-gradient(90deg, var(--text-gray) 0, var(--text-gray) 1px, transparent 1px, transparent 3px, var(--text-gray) 3px, var(--text-gray) 4px, transparent 4px, transparent 6px);
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.6));
    }
    .barcode-widget .barcode-text {
      max-width: 170px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-family: var(--font-mono); font-size: 8px; font-weight: 800; color: var(--text-gray); letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8); text-align: right;
    }

    /* ================= 2. 极致洁净的波形台 ================= */
    .inner-panel {
      position: relative; z-index: 20;
      background: var(--panel-dark); border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }
    .music-box { padding: 12px 16px; }
    .music-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .music-title-tag { font-family: var(--font-eng); font-size: 11px; color: var(--text-white); letter-spacing: 1px; }
    .music-status { font-family: var(--font-mono); font-size: 9px; color: var(--text-gray); letter-spacing: 1px; }
    .music-waves { display: flex; align-items: center; gap: 10px; color: var(--accent-pink); height: 20px; }
    .music-waves span { font-size: 14px; }

    .wave-bars {
      flex: 1; height: 100%;
      background: repeating-linear-gradient(90deg, var(--accent-pink) 0, var(--accent-pink) 1.5px, transparent 1.5px, transparent 4px);
      clip-path: polygon(0 60%, 15% 20%, 30% 90%, 45% 10%, 60% 80%, 75% 30%, 90% 100%, 100% 40%, 100% 100%, 0 100%);
    }

    /* ================= 固定的底座 Dock ================= */
    .bottom-hud-wrapper {
      position: absolute; bottom: 0; left: 0; right: 0; height: 86px; display: flex; align-items: flex-end; z-index: 50; filter: drop-shadow(0 -10px 20px rgba(0,0,0,0.6));
    }
    .hud-bg {
      position: absolute; inset: 0; background: #110e14;
      clip-path: polygon(0 0, calc(100% - 140px) 0, calc(100% - 115px) 16px, 100% 16px, 100% 100%, 0 100%); z-index: 1;
    }
    .hud-border-mask {
      position: absolute; inset: -1px 0 0 0; background: var(--border-color);
      clip-path: polygon(0 0, calc(100% - 139px) 0, calc(100% - 114px) 16px, 100% 16px, 100% 100%, 0 100%); z-index: 0;
    }
    .hud-active-line {
      position: absolute; top: -1px; left: 24px; width: 40px; height: 2px;
      background: #ffffff; z-index: 5; box-shadow: 0 0 10px rgba(255,255,255,0.9);
    }

    .hud-content {
      position: relative; width: 100%; height: 100%; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; z-index: 10;
    }

    .info-block { display: flex; flex-direction: column; justify-content: center; padding-bottom: 4px; }
    .main-title { display: flex; align-items: center; font-size: 32px; font-weight: 900; letter-spacing: 4px; line-height: 1; margin-bottom: 6px; }
    .main-title .name-last { color: var(--text-white); text-shadow: 0 0 12px rgba(255, 255, 255, 0.2); }
    .main-title .name-first { color: var(--accent-pink); margin-left: 8px; }
    .sub-text { font-family: var(--font-mono); font-size: 10px; font-weight: 800; color: var(--text-gray); letter-spacing: 3px; text-transform: uppercase; }
    .sub-text .slash { color: var(--accent-pink); margin: 0 4px; font-weight: 900; }

    .nav-actions { display: flex; align-items: center; gap: 10px; flex: 0 0 auto; }
    .mode-toggle {
      appearance: none;
      border: 1px solid rgba(223, 69, 118, 0.45);
      border-radius: 999px;
      background: rgba(22, 18, 25, 0.78);
      color: var(--accent-pink);
      padding: 5px 8px;
      font-family: var(--font-mono);
      font-size: 8px;
      font-weight: 800;
      letter-spacing: 1px;
      cursor: pointer;
    }
    .character-art.static-art { overflow: visible; }
    .character-art.static-art .standing-layer-stack {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .character-art .static-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center 5%;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    .character-art .static-layer--face { z-index: 10; }
    .character-art .static-layer--mouth { z-index: 20; }
    .character-art .static-layer--base { z-index: 30; }
    .character-art .static-layer--eye { z-index: 40; }
    .character-art .static-layer--brow { z-index: 50; }
    .character-art .static-layer--other { z-index: 60; }
    .character-art .static-layer--accessory { z-index: 70; }

    .action-block { display: flex; align-items: center; justify-content: flex-end; height: 100%; padding-top: 14px; }
    .icon-group { display: flex; align-items: center; gap: 20px; color: var(--text-gray); }
    .icon-group svg { width: 22px; height: 22px; cursor: pointer; transition: color 0.2s ease, transform 0.2s ease; }
    .icon-group svg:hover { color: var(--accent-pink); transform: translateY(-2px) scale(1.1); }

    @media (max-width: 390px) {
      .top-nav-bar { padding-inline: 14px; grid-template-columns: auto minmax(82px, 1fr) auto; gap: 8px; }
      .nav-label { font-size: 9px; letter-spacing: 1.3px; }
      .nav-clock-value { max-width: 104px; font-size: 9px; letter-spacing: 0.4px; }
      .nav-actions { gap: 7px; }
    }

  </style>
</head>
<body>

  <!-- 主外壳：全放开限制，支持物理破窗 -->
  <main class="mobile-app-frame">

    <!-- 背板裁切器 -->
    <div class="frame-bg-clipper">
      <div class="bg-watermark">DOKUHA</div>
      <div class="bg-dots"></div>
      <div class="bg-slashes"></div>
    </div>

    <!-- 顶部状态栏 -->
    <nav class="top-nav-bar">
      <div class="nav-label"><span class="dot"></span> LIVE STREAM</div>
      <div class="nav-clock" aria-label="Current story time">
        <span class="nav-clock-label">LOCAL TIME</span>
        <span class="nav-clock-value" data-dokuha-field="current-time">06.29 20:00</span>
      </div>
      <div class="nav-actions">
        <button class="mode-toggle" type="button" data-dokuha-action="toggle-standing-mode">MODE:<span data-dokuha-field="standing-mode">STATIC</span></button>
        <div class="nav-label">SECURE <span class="secure">●</span></div>
      </div>
    </nav>

    <!-- 核心流式骨架 (溢出可见) -->
    <section class="content-flow">

      <!-- 1. 核心监视区 (极致留白给立绘) -->
      <div class="hero-view">
        <div class="hero-text-bg">
          <div class="hero-live">LIVE</div>
          <div class="hero-streaming">STREAMING</div>
        </div>

        <!-- 爆屏悬浮立绘 -->
        <div id="dokuha-spine" class="character-art static-art" data-dokuha-standing role="img" aria-label="Kosaka Dokuha"></div>

        <!-- 浮动小组件 -->
        <div class="hud-float-stack">
          <div class="hud-ribbon" style="--c: var(--accent-pink);">
            <div class="hud-ribbon-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg></div>
            <div class="hud-ribbon-info">
              <div class="hud-ribbon-top"><span class="hud-ribbon-label">MODE</span><span class="hud-ribbon-val text-value" data-dokuha-field="story-mode">NORMAL</span></div>
            </div>
          </div>
          <div class="hud-ribbon" style="--c: #9c8a9e;">
            <div class="hud-ribbon-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></div>
            <div class="hud-ribbon-info">
              <div class="hud-ribbon-top"><span class="hud-ribbon-label">EMOTION</span><span class="hud-ribbon-val text-value" data-dokuha-field="dynamic-emotion">SLIGHTLY_COLD</span></div>
            </div>
          </div>
          <div class="hud-ribbon" style="--c: #df4576;">
            <div class="hud-ribbon-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.4-9.3-8.3C.8 9.5 2.1 5.3 5.7 4.5 7.8 4 10 5.1 12 7.4c2-2.3 4.2-3.4 6.3-2.9 3.6.8 4.9 5 3 8.2C19 16.6 12 21 12 21z"></path></svg></div>
            <div class="hud-ribbon-info">
              <div class="hud-ribbon-top"><span class="hud-ribbon-label">FAMILIARITY</span><span class="hud-ribbon-val" data-dokuha-field="familiarity">0/500</span></div>
              <div class="ribbon-track"><div class="ribbon-fill" data-dokuha-bar="familiarity" style="width: 0%;"></div></div>
            </div>
          </div>
        </div>

        <div class="barcode-widget">
          <div class="barcode-img"></div>
          <div class="barcode-text" data-dokuha-field="identity">DOKUHA / NEIGHBOR</div>
        </div>
      </div>

      <!-- 2. 关系状态台 -->
      <div class="inner-panel music-box">
        <div class="music-header">
          <div class="music-title-tag"><span style="color:var(--accent-pink); font-size:14px; margin-right:4px;">♡</span>RELATION PROFILE</div>
          <div class="music-status" data-dokuha-field="familiarity-profile">LOW / NEIGHBOR / NON_ATTACHED</div>
        </div>
        <div class="music-waves">
          <span style="font-size:14px">♛</span>
          <div class="wave-bars"></div>
          <div class="wave-bars" style="clip-path:polygon(0 70%, 15% 30%, 30% 80%, 45% 10%, 60% 90%, 75% 40%, 90% 100%, 100% 20%, 100% 100%, 0 100%);"></div>
        </div>
      </div>

    </section>

    <!-- 底部控制台 -->
    <div class="bottom-hud-wrapper">
      <div class="hud-border-mask"></div>
      <div class="hud-bg"></div>
      <div class="hud-active-line"></div>

      <div class="hud-content">
        <div class="info-block">
          <div class="main-title">
            <span class="name-last">狐坂</span>
            <span class="name-first">毒羽</span>
          </div>
          <div class="sub-text" data-dokuha-field="profileLine">NEIGHBOR <span class="slash">/</span> LOW <span class="slash">/</span> NON_ATTACHED</div>
        </div>

        <div class="action-block">
          <div class="icon-group">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </div>
        </div>
      </div>
    </div>

  </main>
  <script>
    window.DOKUHA_STANDING_MODE = (() => {
      const params = new URLSearchParams(location.search);
      const value = params.get('standingMode') || params.get('mode') || 'static';
      return value === 'static' ? 'static' : 'spine';
    })();
  </script>
  <script>
    (() => {
      const CONFIG = {
        skeleton: "dokuha-spine-assets/dkh2.0.json",
        atlas: "dokuha-spine-assets/dkh2.0.atlas",
        fps: 30,
        animations: [
          { name: "animation", startFrame: 80, endFrame: 160, mode: "loop" },
          { name: "hair", startFrame: 80, endFrame: 160, mode: "loop" },
          { name: "eye", startFrame: 0, endFrame: 30, mode: "blink", intervalSeconds: 3 }
        ],
        verticalLook: {
          upAnimation: "up",
          downAnimation: "down",
          startFrame: 80,
          endFrame: 120,
          triggerRange: 0.62,
          inputCurve: 0.9,
          spring: 18,
          dampingRatio: 0.85,
          maxVelocity: 10,
          maxAlpha: 0.58
        },
        horizontalLook: {
          leftAnimation: "left",
          rightAnimation: "right",

      function removeSpineCanvas(mount) {
        mount.querySelectorAll("canvas").forEach((canvas) => canvas.remove());
      }
      function removeStaticLayers(mount) {
        mount.querySelector("[data-dokuha-layer-stack]")?.remove();
      }
      function addLayer(stack, group, name, kind) {
        if (!name) return;
        const image = document.createElement("img");
        image.className = "static-layer static-layer--" + kind;
        image.src = assetUrl(group, name);
        image.alt = "";
        image.decoding = "async";
        image.loading = "eager";
        image.draggable = false;
        stack.append(image);
      }
      function getAutoOtherLayers(face) {
        if (face === "face_pale") return ["ear_face_pale", "face_pale_up"];
        if (face === "face_shadow") return ["face_shadow_up"];
        return [];
      }
      async function renderStandingArt() {
        const mount = document.getElementById("dokuha-spine");
        if (!mount) return;
        const standingMode = getStandingMode();
        const requested = normalizeString(currentState.expression, DEFAULT_STATE.expression);
        const outfit = normalizeOutfit(normalizeString(currentState.outfit, DEFAULT_STATE.outfit));
        const accessories = normalizeAccessories(currentState.accessories);
        mount.classList.toggle("spine-art", standingMode === "spine");
        mount.classList.toggle("static-art", standingMode === "static");
        mount.dataset.standingMode = standingMode;
        mount.dataset.expression = requested;
        mount.dataset.outfit = outfit;
        mount.dataset.accessories = accessories.join(",");

        if (standingMode !== "static") {
          removeStaticLayers(mount);
          return;
        }

        const expressions = await loadExpressions();
        const expression = expressions.find((item) => item && item.name === requested) || staticExpressionFallback;
        const autoOther = getAutoOtherLayers(expression.face);
        const manualOther = Array.isArray(expression.other) ? expression.other : expression.other ? [expression.other] : [];
        const other = [...new Set([
          ...autoOther,
          ...manualOther.filter((name) => !autoOther.includes(name) && !accessories.includes(name))
        ])];
        mount.dataset.expression = expression.name || requested;
        removeSpineCanvas(mount);
        const stack = ensureLayerStack(mount);
        stack.replaceChildren();
        addLayer(stack, "expression/face_fx", "face_default", "face");
        if (expression.face && expression.face !== "face_default") addLayer(stack, "expression/face_fx", expression.face, "face");
        addLayer(stack, "expression/mouth", expression.mouth || "mouth_neutral", "mouth");
        addLayer(stack, "base", outfit, "base");
        addLayer(stack, "expression/eyes", expression.eye || "eye_normal", "eye");
        addLayer(stack, "expression/brow", expression.brow || "brow_normal", "brow");
        other.forEach((name) => addLayer(stack, "expression/other", name, "other"));
        accessories
          .filter((name) => name !== "no_mask")
          .forEach((name) => addLayer(stack, "expression/other", name, "accessory"));
      }

      document.querySelector('[data-dokuha-action="toggle-standing-mode"]')?.addEventListener("click", () => {
        setStandingMode(getStandingMode() === "spine" ? "static" : "spine");
      });

      window.addEventListener("message", (event) => {
        const data = event && event.data;
        if (!data || data.type !== "DOKUHA_STATE_PUSH") return;
        const state = data.state;
        applySystem(data.system || (state && state.system));
        applyState(state, data.familiarityProfile || data.affectionProfile);
        void renderStandingArt();
      });

      applySystem(DEFAULT_SYSTEM);
      applyState(DEFAULT_STATE, deriveFamiliarityProfile(DEFAULT_STATE));
      void renderStandingArt();
      if (document.fonts?.ready) document.fonts.ready.then(fitHudTextValues).catch(() => {});
      try {
        window.parent?.postMessage?.({ type: "DOKUHA_STATUS_READY", appId: "live-stream", reason: "ready" }, "*");
      } catch (_) {}
    })();
  </script>
</body>
